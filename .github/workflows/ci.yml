name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: claimuser
          POSTGRES_PASSWORD: claimpassword
          POSTGRES_DB: claimvision
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libtesseract-dev

    - name: Install Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install ruff pytest httpx
        pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        cd backend
        ruff check app tests

    - name: Test with pytest
      env:
        DATABASE_URL: postgresql://claimuser:claimpassword@localhost:5432/claimvision
      run: |
        cd backend
        PYTHONPATH=. pytest
